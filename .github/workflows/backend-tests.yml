name: backend-tests

# Esegue la suite di test del backend (offline, nessun DB/modello richiesto)
# a ogni push e pull request.
on:
  push:
  pull_request:
  workflow_dispatch:   # permette l'avvio manuale dal tab Actions

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest -q
