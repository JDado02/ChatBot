<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Interactive Experience</title>
    <meta name="description" content="A stunning, interactive Hello World experience with beautiful animations, multiple languages, and modern glassmorphism design.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #0f0c1b, #15102a, #241442, #391254);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-glow: linear-gradient(135deg, #ff007f, #7f00ff);
            --accent-color: #ff007f;
            --shadow-color: rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(-45deg, #f3f0ff, #e8e0ff, #d9ccff, #c3b0ff);
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(127, 0, 255, 0.15);
            --text-primary: #1e0b36;
            --text-secondary: rgba(30, 11, 54, 0.7);
            --accent-glow: linear-gradient(135deg, #7f00ff, #ff007f);
            --accent-color: #7f00ff;
            --shadow-color: rgba(127, 0, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-primary);
            transition: background 0.5s ease;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient Background Lights */
        .ambient-light {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--accent-glow);
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            animation: float 10s ease-in-out infinite alternate;
        }

        .light-1 {
            top: 20%;
            left: 20%;
        }

        .light-2 {
            bottom: 20%;
            right: 20%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* Container Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3.5rem 2.5rem;
            width: 90%;
            max-width: 480px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px var(--shadow-color);
            z-index: 10;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: hidden;
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: rotate(15deg) scale(1.1);
            background: rgba(255, 255, 255, 0.1);
        }

        .emoji-avatar {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: wave 2.5s infinite;
            transform-origin: 70% 70%;
        }

        @keyframes wave {
            0% { transform: rotate( 0.0deg) }
           10% { transform: rotate(14.0deg) }
           20% { transform: rotate(-8.0deg) }
           30% { transform: rotate(14.0deg) }
           40% { transform: rotate(-4.0deg) }
           50% { transform: rotate(10.0deg) }
           60% { transform: rotate( 0.0deg) }
          100% { transform: rotate( 0.0deg) }
        }

        .title-wrapper {
            position: relative;
            height: 70px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: absolute;
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            white-space: nowrap;
        }

        h1.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        p.subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Button design */
        .btn {
            font-family: 'Outfit', sans-serif;
            background: var(--accent-glow);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 0, 127, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 25px rgba(255, 0, 127, 0.4);
        }

        .btn:active {
            transform: translateY(1px) scale(0.98);
        }

        /* Sparkle effect on click */
        .particle {
            position: absolute;
            pointer-events: none;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-color);
            animation: pop 0.6s ease-out forwards;
            opacity: 0.8;
        }

        @keyframes pop {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Language indicator badge */
        .lang-badge {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            font-weight: 600;
            opacity: 0.8;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <div class="card" id="mainCard">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
            <!-- Moon Icon -->
            <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <!-- Sun Icon -->
            <svg id="sunIcon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>

        <span class="emoji-avatar" id="emojiAvatar">👋</span>
        
        <div class="title-wrapper">
            <!-- Headers will be inserted dynamically for transitions -->
        </div>

        <p class="subtitle" id="subtitleText">Benvenuto in questa applicazione interattiva. Clicca il pulsante qui sotto per viaggiare nel mondo!</p>

        <button class="btn" id="helloBtn">
            <span>Cambia Lingua</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
        </button>

        <div class="lang-badge" id="langBadge">Italiano</div>
    </div>

    <script>
        const hellos = [
            { text: "Hello World", lang: "English", emoji: "👋", sub: "Welcome to this interactive app. Click below to cycle through languages!" },
            { text: "Ciao Mondo", lang: "Italiano", emoji: "🇮🇹", sub: "Benvenuto in questa applicazione. Clicca sotto per cambiare lingua!" },
            { text: "Hola Mundo", lang: "Español", emoji: "🇪🇸", sub: "¡Bienvenido a esta aplicación interactiva! ¡Haz clic abajo para cambiar!" },
            { text: "Bonjour le Monde", lang: "Français", emoji: "🇫🇷", sub: "Bienvenue dans cette application interactive. Cliquez ci-dessous !" },
            { text: "Hallo Welt", lang: "Deutsch", emoji: "🇩🇪", sub: "Willkommen in dieser interaktiven App. Klicken Sie unten zum Ändern!" },
            { text: "Olá Mundo", lang: "Português", emoji: "🇧🇷", sub: "Bem-vindo a este aplicativo interativo. Clique abaixo para alterar!" },
            { text: "Hello Mundu", lang: "Esperanto", emoji: "🌍", sub: "Bonvenon al ĉi tiu interaga apo. Alklaku sube por ŝanĝi!" },
            { text: "こんにちは世界", lang: "日本語", emoji: "🇯🇵", sub: "このインタラクティブなアプリへようこそ！切り替えるeneには以下をクリック！" }
        ];

        let index = 1; // start with Italian since the prompt is Italian
        const titleWrapper = document.querySelector('.title-wrapper');
        const subtitleText = document.getElementById('subtitleText');
        const helloBtn = document.getElementById('helloBtn');
        const langBadge = document.getElementById('langBadge');
        const emojiAvatar = document.getElementById('emojiAvatar');
        const themeToggle = document.getElementById('themeToggle');
        const moonIcon = document.getElementById('moonIcon');
        const sunIcon = document.getElementById('sunIcon');

        // Create initial active header
        const initialHello = hellos[index];
        const h1 = document.createElement('h1');
        h1.textContent = initialHello.text;
        h1.className = 'active';
        titleWrapper.appendChild(h1);
        langBadge.textContent = initialHello.lang;
        emojiAvatar.textContent = initialHello.emoji;
        subtitleText.textContent = initialHello.sub;

        function updateGreeting() {
            index = (index + 1) % hellos.length;
            const current = hellos[index];

            // Transition headers
            const oldH1 = titleWrapper.querySelector('h1.active');
            if (oldH1) {
                oldH1.classList.remove('active');
                setTimeout(() => oldH1.remove(), 500);
            }

            const newH1 = document.createElement('h1');
            newH1.textContent = current.text;
            titleWrapper.appendChild(newH1);
            
            // Force reflow
            newH1.offsetHeight;
            newH1.classList.add('active');

            // Update details
            langBadge.textContent = current.lang;
            emojiAvatar.textContent = current.emoji;
            subtitleText.textContent = current.sub;
        }

        // Particle pop on click
        helloBtn.addEventListener('click', (e) => {
            updateGreeting();

            // Create particles
            const rect = helloBtn.getBoundingClientRect();
            const btnX = rect.left + rect.width / 2;
            const btnY = rect.top + rect.height / 2;

            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Random destination angles/distances
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 60;
                const tx = Math.cos(angle) * distance + 'px';
                const ty = Math.sin(angle) * distance + 'px';
                
                particle.style.setProperty('--tx', tx);
                particle.style.setProperty('--ty', ty);
                
                // Position at center of button
                particle.style.left = e.clientX - 4 + 'px';
                particle.style.top = e.clientY - 4 + 'px';
                particle.style.position = 'fixed';
                
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 600);
            }
        });

        // Theme Toggle
        themeToggle.addEventListener('click', () => {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            } else {
                body.setAttribute('data-theme', 'light');
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            }
        });
    </script>
</body>
</html>
